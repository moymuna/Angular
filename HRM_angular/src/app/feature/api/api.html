<div class="container mt-4">

  <!-- FORM -->
  <div class="card shadow-sm p-3 mb-4">

    <h3 class="text-center mb-3">
      Generic API CRUD
    </h3>

    <form class="row g-3">

      <!-- FIRST NAME -->
      <div class="col-md-4">
        <input
          type="text"
          class="form-control"
          placeholder="First Name"
          [(ngModel)]="employee.firstName"
          name="firstName"
        />
      </div>

      <!-- LAST NAME -->
      <div class="col-md-4">
        <input
          type="text"
          class="form-control"
          placeholder="Last Name"
          [(ngModel)]="employee.lastName"
          name="lastName"
        />
      </div>

      <!-- EMAIL -->
      <div class="col-md-4">
        <input
          type="email"
          class="form-control"
          placeholder="Email"
          [(ngModel)]="employee.email"
          name="email"
        />
      </div>

      <!-- BUTTON -->
      <div class="col-md-12 d-grid">

        <button
          type="button"
          class="btn btn-success"
          *ngIf="!isEdit"
          (click)="addEmployee()"
        >
          Add Employee
        </button>

        <button
          type="button"
          class="btn btn-primary"
          *ngIf="isEdit"
          (click)="updateEmployee()"
        >
          Update Employee
        </button>

      </div>

    </form>

  </div>

  <!-- TABLE -->
  <div class="card shadow-sm p-3">

    <table class="table table-striped table-hover text-center">

      <thead class="table-dark">

        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Action</th>
        </tr>

      </thead>

      <tbody>

        <tr *ngFor="let emp of employees">

          <td>{{ emp.id }}</td>

          <td>
            {{ emp.firstName }}
            {{ emp.lastName }}
          </td>

          <td>{{ emp.email }}</td>

          <td>

            <button
              class="btn btn-warning btn-sm me-2"
              (click)="editEmployee(emp)"
            >
              Edit
            </button>

            <button
              class="btn btn-danger btn-sm"
              (click)="deleteEmployee(emp.id)"
            >
              Delete
            </button>

          </td>

        </tr>

      </tbody>

    </table>

  </div>

</div>
